name: fitness_tracker
description: "A fitness tracking app to record and monitor daily fitness activities."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # SQLite Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.0   # Required for desktop (Windows/Linux/macOS)
  path: ^1.9.0

  # File System
  path_provider: ^2.1.4

  # Date Formatting
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.69.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Image Picker (for profile photo)
  image_picker: ^1.1.2

  # Cached Network Image (for profile photo display)
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
